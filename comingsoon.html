  <script>
    // sparkle cursor trail
    const sparkleChars = ['έεο', 'έεπ', 'έαΗ', 'έαΖ', 'έερ', '*'];
    let lastSparkle = 0;
    document.addEventListener('mousemove', (e) => {
      const now = Date.now();
      if (now - lastSparkle < 60) return; // throttle so it doesn't flood the DOM
      lastSparkle = now;

      const el = document.createElement('span');
      el.className = 'sparkle-trail';
      el.textContent = sparkleChars[Math.floor(Math.random() * sparkleChars.length)];
      el.style.left = e.clientX + 'px';
      el.style.top = e.clientY + 'px';
      el.style.color = `hsl(${Math.floor(Math.random() * 360)}, 100%, 70%)`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2400);
    });

    // edit STATUS_MESSAGES to change what it says
    const STATUS_MESSAGES = [
      '404',
      '420',
      "67",
      'coming soon'
    ];
    const statusEl = document.getElementById('statusLine');
    let msgIndex = 0;
    let charIndex = 0;
    let typing = true;

    function typeStatus() {
      const current = STATUS_MESSAGES[msgIndex];
      if (typing) {
        charIndex++;
        statusEl.innerHTML = current.slice(0, charIndex) + '<span class="cursor">&nbsp;</span>';
        if (charIndex === current.length) {
          typing = false;
          setTimeout(typeStatus, 1800); // pause before deleting
          return;
        }
      } else {
        charIndex--;
        statusEl.innerHTML = current.slice(0, charIndex) + '<span class="cursor">&nbsp;</span>';
        if (charIndex === 0) {
          typing = true;
          msgIndex = (msgIndex + 1) % STATUS_MESSAGES.length;
        }
      }
      setTimeout(typeStatus, typing ? 55 : 30);
    }
    typeStatus();
  </script>


</body>
