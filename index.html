<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lily wakefield presents ... lilywakefield.com.au</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="styles.css">
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }

    /* ---- top banner (marquee + hero) ---- */
    .ticker {
      background: #000;
      border-top: 3px dashed #ff00ff;
      border-bottom: 3px dashed #00ffff;
      overflow: hidden;
      white-space: nowrap;
      padding: 6px 0;
      flex-shrink: 0;
    }
    .ticker span {
      display: inline-block;
      padding-left: 100%;
      animation: scroll-left 18s linear infinite;
      font-family: "Courier New", monospace;
      font-weight: bold;
      font-size: 18px;
      background: linear-gradient(90deg, #ff0000, #ff9900, #ffee00, #33ff00, #00ffee, #3300ff, #ff00ee);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    @keyframes scroll-left {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }
    .hero {
      text-align: center;
      padding: 10px 0;
      border-bottom: 3px ridge #ff00ff;
      flex-shrink: 0;
    }
    .hero h1 {
      font-family: "Impact", "Arial Black", sans-serif;
      font-size: 40px;
      letter-spacing: 2px;
      margin: 0;
      background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.4);
    }
    .hero .subtitle {
      font-size: 14px;
      color: #00ffff;
      text-shadow: 0 0 6px #00ffff;
    }

    /* ---- frame area: nav pane (left) + content pane (right) ---- */
    .frame-area {
      flex: 1;
      display: grid;
      grid-template-columns: 160px 1fr;
      min-height: 0; /* lets iframes fill remaining height correctly */
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    #navFrame {
      border-right: 4px ridge #ff00ff;
    }

    @media (max-width: 600px) {
      .frame-area { grid-template-columns: 110px 1fr; }
      .hero h1 { font-size: 28px; }
    }
  </style>
</head>
<body>

  <div class="ticker"><span>✦ thank you for visiting and i welcome you with open arms ✦</span></div>

  <div class="hero">
    <h1>✧ lily wakefield ✧</h1>
    <div class="subtitle">lilywakefield.com.au</div>
  </div>

  <div class="frame-area">
    <iframe id="navFrame" name="navFrame" src="nav.html" title="site navigation"></iframe>
    <iframe id="mainFrame" name="mainFrame" src="home.html" title="page content"></iframe>
  </div>

</body>
</html>
