<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>coming soon</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="css/site.css">
</head>
<body>

  <div class="ticker"><span>✦ thank you for visiting and i'm sorry the movie is not here yet ✦</span></div>

  <div class="layout">
    <div class="sidebar" id="sidebar"></div>

    <div class="frame">

      <div class="hero">
        <h1>✧ MOVIE COMING SOON ✧</h1>
        <p class="blink">☆ 🚧 FILM UNDER CONSTRUCTION 🚧 ☆</p>
        <div class="status-line" id="statusLine"></div>
      </div>

      <p> also coming soon: suggestions box</p>

      <div class="divider">★ ° ☆ ° ★ ° ☆ ° ★</div>

      <footer>
      ★ ° ☆ ° ★ ° ☆ ° ★ 2026 lily wakefield ★ ° ☆ ° ★ ° ☆ ° ★<br>
        <img src="/images/favicon.ico" alt="site icon" width="24" height="24">
        best experienced with an open heart
      </footer>

    </div>
  </div>

  <script src="js/nav.js"></script>
  <script src="js/effects.js"></script>

  <script>
    // edit STATUS_MESSAGES to change what it says
    const STATUS_MESSAGES = [
      '404',
      "✦ thank you for visiting and i'm sorry the movie is not here yet ✦",
      '404',
      '420',
      "67",
      'coming soon',
      '404',
      'coming soon',
      '404',
      '420',
      "67",
      'coming soon',
    ];
    const statusEl = document.getElementById('statusLine');
    let msgIndex = 0;
    let charIndex = 0;
    let typing = true;

    function typeStatus() {
      const current = STATUS_MESSAGES[msgIndex];
      if (typing) {
        charIndex++;
        statusEl.innerHTML = current.slice(0, charIndex) + '<span class="cursor">&nbsp;</span>';
        if (charIndex === current.length) {
          typing = false;
          setTimeout(typeStatus, 1800); // pause before deleting
          return;
        }
      } else {
        charIndex--;
        statusEl.innerHTML = current.slice(0, charIndex) + '<span class="cursor">&nbsp;</span>';
        if (charIndex === 0) {
          typing = true;
          msgIndex = (msgIndex + 1) % STATUS_MESSAGES.length;
        }
      }
      setTimeout(typeStatus, typing ? 55 : 30);
    }
    typeStatus();
  </script>


</body>
</html>
