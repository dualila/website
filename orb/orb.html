<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/images/favicon.ico">
<title>the orb</title>
<link rel="stylesheet" href="../css/site.css">
<style>
  .blob-page {
    --hot-pink: #ff00ff;
    --cyan: #00ffff;
    --gold: #ffd700;
    --lime: #a6ff00;
    --hungry: #ffb347;
    --neglected: #8b8f94;
    --dead: #666666;
    --ink: #f5f5f5;
  

    font-family: "Courier New", monospace;
    color: var(--ink);
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 8px 32px;
    box-sizing: border-box;
  }

  .blob-page *, .blob-page *::before, .blob-page *::after {
    box-sizing: border-box;
  }
  
  .blob-page .subtitle {
    font-family: "times new roman", "Comic Sans", cursive;
    font-size: 0.85rem;
    color: var(--cyan);
    text-shadow: 0 0 6px var(--cyan);
    margin-bottom: 32px;
    text-align: center;
    max-width: 360px;
    line-height: 1.5;
  }

  .blob-stage {
    position: relative;
    width: min(320px, 78vw);
    height: min(320px, 78vw);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
  }

  .blob-shadow {
    position: absolute;
    bottom: 6%;
    width: 60%;
    height: 22px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.4) 0%, transparent 70%);
    border-radius: 50%;
    z-index: 0;
  }

  .blob-svg {
    position: relative;
    z-index: 1;
    width: 82%;
    height: 82%;
    animation: breathe 3.4s ease-in-out infinite;
    transform-origin: 50% 60%;
    filter: drop-shadow(0 0 10px rgba(255, 0, 255, 0.5));
  }

  .blob-svg.mood-happy { animation-name: breathe-happy; animation-duration: 2.2s; }
  .blob-svg.mood-neglected { animation-name: breathe-tired; animation-duration: 4.6s; }
  .blob-svg.mood-dead { animation: none; opacity: 0.6; filter: grayscale(0.6); }

  @keyframes breathe {
    0%, 100% { transform: scale(1, 1) translateY(0); }
    50% { transform: scale(1.02, 0.97) translateY(2px); }
  }
  @keyframes breathe-happy {
    0%, 100% { transform: scale(1, 1) translateY(0) rotate(0deg); }
    25% { transform: scale(1.05, 0.94) translateY(-6px) rotate(-2deg); }
    75% { transform: scale(0.96, 1.05) translateY(2px) rotate(2deg); }
  }
  @keyframes breathe-tired {
    0%, 100% { transform: scale(1, 1) translateY(0); }
    50% { transform: scale(1.01, 0.98) translateY(4px); }
  }

  .blob-body {
    transition: fill 0.8s ease;
  }

  .blob-status {
    font-family: "times new roman", "Comic Sans", cursive;
    font-weight: bold;
    font-size: 1.1rem;
    color: var(--gold);
    text-shadow: 0 0 6px rgba(255, 217, 74, 0.6);
    margin: 16px 0 2px;
    text-align: center;
  }

  .blob-meta {
    font-size: 0.72rem;
    color: #ccc;
    margin-bottom: 24px;
    text-align: center;
    letter-spacing: 0.5px;
  }

  .stat-row {
    width: min(340px, 88vw);
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .stat-label {
    width: 64px;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--cyan);
    text-shadow: 0 0 3px var(--cyan);
    flex-shrink: 0;
  }

  .stat-track {
    flex: 1;
    height: 10px;
    background: #000;
    border: 1px solid #333;
    border-radius: 6px;
    overflow: hidden;
  }

  .stat-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.6s ease, background 0.6s ease;
  }

  .stat-fill.hunger { background: var(--hungry); box-shadow: 0 0 6px var(--hungry); }
  .stat-fill.happiness { background: var(--hot-pink); box-shadow: 0 0 6px var(--hot-pink); }
  .stat-fill.pets { background: var(--lime); box-shadow: 0 0 6px var(--lime); }

  .actions {
    display: flex;
    gap: 12px;
    margin-bottom: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .blob-btn {
    font-family: "Comic Sans MS", cursive;
    font-weight: bold;
    font-size: 0.78rem;
    background: linear-gradient(to bottom, var(--hot-pink), #9900cc);
    border: 2px outset var(--hot-pink);
    color: #fff;
    padding: 10px 18px;
    border-radius: 4px;
    cursor: pointer;
    transition: filter 0.15s ease;
  }

  .blob-btn:hover:not(:disabled) {
    filter: brightness(1.2);
    animation: blobJelly 0.4s;
  }

  @keyframes blobJelly {
    0% { transform: scale(1); }
    25% { transform: scale(1.08,.95); }
    50% { transform: scale(.96,1.05); }
    75% { transform: scale(1.04,.97); }
    100% { transform: scale(1); }
  }

  .blob-btn:active:not(:disabled) {
    border-style: inset;
    background: linear-gradient(to bottom, #9900cc, var(--hot-pink));
    padding: 11px 17px 9px 19px;
  }

  .blob-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    filter: grayscale(0.6);
  }

  .cooldown-note {
    font-size: 0.66rem;
    color: #999;
    text-align: center;
    min-height: 16px;
    margin-bottom: 20px;
  }

  .hatch-btn {
    background: linear-gradient(to bottom, var(--gold), #b8860b);
    border-color: var(--gold);
    color: #1a0033;
    margin-top: 12px;
  }


  .log-title {
    font-family: "times new roman", cursive;
    font-weight: bold;
    font-size: 0.9rem;
    color: var(--gold);
    text-shadow: 0 0 4px rgba(255, 217, 74, 0.6);
    margin-bottom: 10px;
    text-align: center;
  }

  .log-box {
    width: min(340px, 88vw);
    max-height: 160px;
    overflow-y: auto;
    background: #000;
    border: 2px inset var(--lime);
    border-radius: 2px;
    padding: 12px 14px;
    font-size: 0.72rem;
    line-height: 1.9;
    color: #0f0;
  }

  .log-box::-webkit-scrollbar { width: 8px; }
  .log-box::-webkit-scrollbar-track { background: #000; border-left: 1px dashed #0f0; }
  .log-box::-webkit-scrollbar-thumb { background: #0f0; border: 2px solid #000; }

  .log-entry { opacity: 0.85; }
  .log-entry.death { color: var(--hungry); opacity: 0.95; }
  .log-entry.birth { color: var(--hot-pink); text-shadow: 0 0 3px var(--hot-pink); opacity: 0.95; }
  .log-empty { opacity: 0.5; font-style: italic; }

  .name-gate {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-align: center;
    max-width: 320px;
  }

  .name-gate p {
    font-family: "times new roman", cursive;
    color: var(--cyan);
  }

  .name-gate input {
    font-family: "Courier New", monospace;
    font-size: 0.85rem;
    padding: 10px 14px;
    background: #000;
    color: #0f0;
    border: 2px inset var(--lime);
    border-radius: 2px;
    width: 220px;
    outline: none;
  }

  .name-gate input:focus {
    border-color: var(--cyan);
  }

  .whoami {
    font-family: "Courier New", monospace;
    font-size: 0.64rem;
    color: #999;
    margin-top: -8px;
    margin-bottom: 20px;
  }

  .whoami button {
    background: none;
    border: none;
    text-decoration: underline;
    font-family: inherit;
    font-size: inherit;
    color: var(--cyan);
    cursor: pointer;
    padding: 0;
  }

  @media (prefers-reduced-motion: reduce) {
    .blob-svg { animation: none !important; }
  }
</style>
</head>
<body>
    <div class="ticker"><span>✦ thank you for visiting and i ask you to feed the orb  ✦</span></div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>

  <div class="frame">
    <div class="blob-page">

       <div class="hero">
        <h1>✧ the orb ✧</h1>
        <p class="blink">☆ feed it pat it etc or it feels neglected and dies ☆</p>
        <div class="divider">★ ° ☆ ° ★ ° ☆ ° ★</div>
      </div>

      <div id="nameGate" class="name-gate" style="display:none;">
        <p>who's this?</p>
        <input id="nameInput" type="text" maxlength="20" placeholder="your name isn't Dua Lipa" />
        <button class="blob-btn" id="nameSubmit">say hi</button>
        
      </div>

      <div id="petUI" style="display:none; flex-direction:column; align-items:center; width:100%;">

        <p class="whoami">you're <strong id="whoamiName"></strong> · <button id="changeNameBtn">or not you?</button></p>

        <div class="blob-stage">
          <div class="blob-shadow"></div>
          <svg id="blobSvg" class="blob-svg mood-neutral" viewBox="0 0 200 200">
            <ellipse class="blob-body" id="blobBody" cx="100" cy="115" rx="72" ry="62" fill="#ff00ff"/>
            <g id="blobFace"></g>
          </svg>
        </div>

        <div class="blob-status" id="blobStatusText">...</div>
        <div class="blob-meta" id="blobMetaText"></div>

        <div class="stat-row" id="statRow">
          <div class="stat">
            <span class="stat-label">hunger</span>
            <div class="stat-track"><div class="stat-fill hunger" id="hungerFill" style="width:0%"></div></div>
          </div>
          <div class="stat">
            <span class="stat-label">happy</span>
            <div class="stat-track"><div class="stat-fill happiness" id="happinessFill" style="width:0%"></div></div>
          </div>
          <div class="stat">
            <span class="stat-label">pets</span>
            <div class="stat-track"><div class="stat-fill pets" id="petsFill" style="width:0%"></div></div>
          </div>
        </div>

        <div class="actions" id="actionsRow">
          <button class="blob-btn" id="feedBtn">feed</button>
          <button class="blob-btn" id="playBtn">play</button>
          <button class="blob-btn" id="comfortBtn">pat</button>
        </div>
        <div class="cooldown-note" id="cooldownNote"></div>

        <button class="blob-btn hatch-btn" id="hatchBtn" style="display:none;">hatch a new orb!!!!</button>

        <div class="divider">★ ° ☆ ° ★ ° ☆ ° ★</div>

        <div class="log-title">who's been touching the orb ???</div>
        
        <div class="log-box" id="logBox">
          <div class="log-empty">loading..!!!.</div>
        </div>

      </div>

    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc,
  collection, addDoc, query, orderBy, limit, onSnapshot,
  serverTimestamp, Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA25PaWUE39RuX-huMHoziQVUPy_pNFXUE",
      authDomain: "dot-com-44502.firebaseapp.com",
      projectId: "dot-com-44502",
      storageBucket: "dot-com-44502.firebasestorage.app",
      messagingSenderId: "124684406308",
      appId: "1:124684406308:web:146706a03bb4bd451552b1",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const PET_DOC = "pets/theblob";
const LOG_COLLECTION = "petLog";
const STARTING_STAT = 80;
const DECAY_PER_HOUR = 4;
const FEED_BOOST = { hunger: 30, happiness: 5, pets: 0 };
const PLAY_BOOST = { hunger: -4, happiness: 28, pets: 0 };
const COMFORT_BOOST = { hunger: 0, happiness: 10, pets: 25 };
const ACTION_COOLDOWN_MS = 3 * 60 * 1000;
const DEATH_GRACE_MS = 8 * 60 * 60 * 1000;
const LOG_LIMIT = 30;

let myName = localStorage.getItem("blobVisitorName") || "";

const nameGate = document.getElementById("nameGate");
const petUI = document.getElementById("petUI");
const nameInput = document.getElementById("nameInput");

function showNameGate() {
  nameGate.style.display = "flex";
  petUI.style.display = "none";
}

function showPetUI() {
  nameGate.style.display = "none";
  petUI.style.display = "flex";
  document.getElementById("whoamiName").textContent = myName;
}

document.getElementById("nameSubmit").addEventListener("click", () => {
  const val = nameInput.value.trim();
  if (!val) return;
  myName = val.slice(0, 20);
  localStorage.setItem("blobVisitorName", myName);
  showPetUI();
});

nameInput?.addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("nameSubmit").click();
});

document.getElementById("changeNameBtn").addEventListener("click", () => {
  showNameGate();
  nameInput.value = "";
  nameInput.focus();
});

if (!myName) {
  showNameGate();
} else {
  showPetUI();
}

function getPetRef() {
  const [col, id] = PET_DOC.split("/");
  return doc(db, col, id);
}

async function ensurePetExists() {
  const ref = getPetRef();
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      hunger: STARTING_STAT,
      happiness: STARTING_STAT,
      pets: STARTING_STAT,
      alive: true,
      generation: 1,
      bornAt: Timestamp.now(),
      lastUpdated: Timestamp.now(),
      diedAt: null
    });
  }
}

function clamp(n) { return Math.max(0, Math.min(100, n)); }

function applyDecay(pet) {
  if (!pet.alive) return pet;
  const petsStart = pet.pets ?? pet.energy ?? 80;

  const now = Date.now();
  const last = pet.lastUpdated.toMillis ? pet.lastUpdated.toMillis() : pet.lastUpdated;
  const hoursElapsed = Math.max(0, (now - last) / (1000 * 60 * 60));
  const loss = hoursElapsed * DECAY_PER_HOUR;

  const decayed = {
    ...pet,
    hunger: clamp(pet.hunger - loss),
    happiness: clamp(pet.happiness - loss),
    pets: clamp(petsStart - loss)
  };

  if (decayed.hunger <= 0 && decayed.happiness <= 0 && decayed.pets <= 0) {
    const overflowHours = Math.max(0, hoursElapsed - (STARTING_STAT / DECAY_PER_HOUR));
    if (overflowHours * 60 * 60 * 1000 >= DEATH_GRACE_MS) {
      decayed.alive = false;
      decayed.diedAt = Timestamp.now();
    }
  }

  return decayed;
}

async function logEvent(type, text) {
  await addDoc(collection(db, LOG_COLLECTION), {
    type,
    text,
    createdAt: serverTimestamp()
  });
}

function getCooldownRemaining() {
  const last = parseInt(localStorage.getItem("blobLastAction") || "0", 10);
  const remaining = ACTION_COOLDOWN_MS - (Date.now() - last);
  return Math.max(0, remaining);
}

function setCooldownNow() {
  localStorage.setItem("blobLastAction", Date.now().toString());
}

function updateCooldownUI() {
  const remaining = getCooldownRemaining();
  const btns = [feedBtn, playBtn, comfortBtn];
  const note = document.getElementById("cooldownNote");
  if (remaining > 0) {
    btns.forEach(b => b.disabled = true);
    const mins = Math.ceil(remaining / 60000);
    note.textContent = `you can look after the orb again in ~${mins} min`;
  } else {
    if (currentPet && currentPet.alive) btns.forEach(b => b.disabled = false);
    note.textContent = "";
  }
}
setInterval(updateCooldownUI, 15000);

const ASCII_FACES = {
  dead: "( x_x )",
  happy: "( ｡◕ ‿‿ ◕｡ )",
  hungry: "( o_O) ",
  neglected: "( >_< )",
  neutral: ":]"
};

function renderFace(mood) {
  const face = document.getElementById("blobFace");
  const glyph = ASCII_FACES[mood] || ASCII_FACES.neutral;
  const jitterX = (Math.random() * 4 - 2).toFixed(1);
  const jitterRot = (Math.random() * 4 - 2).toFixed(1);
  face.innerHTML = `
    <text x="${100 + Number(jitterX)}" y="122"
      text-anchor="middle"
      font-family="'Courier New', monospace"
      font-size="34"
      font-weight="bold"
      fill="#1a0033"
      transform="rotate(${jitterRot} 100 115)"
      style="letter-spacing:-1px;">${glyph}</text>
  `;
}

function moodFromStats(pet) {
  if (!pet.alive) return "dead";
  const avg = (pet.hunger + pet.happiness + pet.pets) / 3;
  if (pet.hunger < 25) return "hungry";
  if (avg < 30) return "neglected";
  if (avg > 70) return "happy";
  return "neutral";
}

const moodColors = {
  happy: "#ff00ff",
  neutral: "#e055c9",
  hungry: "#ffb347",
  neglected: "#8b8f94",
  dead: "#666666"
};

const moodLabels = {
  happy: "feeling great!",
  neutral: "doing okay",
  hungry: "getting hungry...",
  neglected: "feeling forgotten :(",
  dead: "has passed away"
};

let currentPet = null;

function render(pet) {
  currentPet = pet;
  const mood = moodFromStats(pet);
  const svg = document.getElementById("blobSvg");
  const body = document.getElementById("blobBody");

    const moodClass = mood === "happy" ? "happy" : mood === "dead" ? "dead" : mood === "neglected" ? "neglected" : "neutral";
  svg.setAttribute("class", `blob-svg mood-${moodClass}`);
  body.setAttribute("fill", moodColors[mood]);
  renderFace(mood);
  document.getElementById("blobStatusText").textContent = moodLabels[mood];

  const bornDate = pet.bornAt.toDate ? pet.bornAt.toDate() : new Date(pet.bornAt);
  document.getElementById("blobMetaText").textContent =
    pet.alive
      ? `generation ${pet.generation} · born ${bornDate.toLocaleDateString()}`
      : `generation ${pet.generation} · lived from ${bornDate.toLocaleDateString()} until ${(pet.diedAt.toDate ? pet.diedAt.toDate() : new Date(pet.diedAt)).toLocaleDateString()}`;

  document.getElementById("hungerFill").style.width = pet.hunger + "%";
  document.getElementById("happinessFill").style.width = pet.happiness + "%";
  document.getElementById("petsFill").style.width = pet.pets + "%";

  const actionsRow = document.getElementById("actionsRow");
  const hatchBtn = document.getElementById("hatchBtn");
  const statRow = document.getElementById("statRow");

  if (pet.alive) {
    actionsRow.style.display = "flex";
    statRow.style.display = "flex";
    hatchBtn.style.display = "none";
    updateCooldownUI();
  } else {
    actionsRow.style.display = "none";
    statRow.style.display = "none";
    hatchBtn.style.display = "inline-block";
    document.getElementById("cooldownNote").textContent = "";
  }
}

const feedBtn = document.getElementById("feedBtn");
const playBtn = document.getElementById("playBtn");
const comfortBtn = document.getElementById("comfortBtn");
const hatchBtn = document.getElementById("hatchBtn");

async function performAction(boost, verb) {
  if (getCooldownRemaining() > 0 || !currentPet || !currentPet.alive) return;
  setCooldownNow();
  updateCooldownUI();

  const ref = getPetRef();
  const snap = await getDoc(ref);
  const pet = applyDecay(snap.data());

  const updated = {
    hunger: clamp(pet.hunger + boost.hunger),
    happiness: clamp(pet.happiness + boost.happiness),
    pets: clamp(pet.pets + boost.pets),
    lastUpdated: Timestamp.now()
  };

  await updateDoc(ref, updated);
  await logEvent("care", `${myName} ${verb} the blob`);
}

feedBtn.addEventListener("click", () => performAction(FEED_BOOST, "fed"));
playBtn.addEventListener("click", () => performAction(PLAY_BOOST, "played with"));
comfortBtn.addEventListener("click", () => performAction(COMFORT_BOOST, "petted"));

hatchBtn.addEventListener("click", async () => {
  const ref = getPetRef();
  const snap = await getDoc(ref);
  const pet = snap.data();
  const newGen = (pet.generation || 1) + 1;

  await setDoc(ref, {
    hunger: STARTING_STAT,
    happiness: STARTING_STAT,
    pets: STARTING_STAT,
    alive: true,
    generation: newGen,
    bornAt: Timestamp.now(),
    lastUpdated: Timestamp.now(),
    diedAt: null
  });

  await logEvent("birth", `${myName} hatched generation ${newGen}`);
});

function renderLog(entries) {
  const box = document.getElementById("logBox");
  if (entries.length === 0) {
    box.innerHTML = `<div class="log-empty">no visitors yet — be the first</div>`;
    return;
  }
  box.innerHTML = entries.map(e => {
    const cls = e.type === "death" ? "death" : e.type === "birth" ? "birth" : "";
    const when = e.createdAt?.toDate ? timeAgo(e.createdAt.toDate()) : "just now";
    return `<div class="log-entry ${cls}">${escapeHtml(e.text)} · ${when}</div>`;
  }).join("");
}

function timeAgo(date) {
  const secs = Math.floor((Date.now() - date.getTime()) / 1000);
  if (secs < 60) return "just now";
  if (secs < 3600) return `${Math.floor(secs / 60)}m ago`;
  if (secs < 86400) return `${Math.floor(secs / 3600)}h ago`;
  return `${Math.floor(secs / 86400)}d ago`;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

async function init() {
  await ensurePetExists();
  const ref = getPetRef();

  onSnapshot(ref, async (snap) => {
    if (!snap.exists()) return;
    let pet = snap.data();
    const decayed = applyDecay(pet);

    if (decayed.alive === false && pet.alive === true) {
      await updateDoc(ref, { alive: false, diedAt: decayed.diedAt });
      await logEvent("death", `the blob (gen ${pet.generation}) didn't make it — nobody came by in time`);
      return;
    }

    render(decayed);
  });

  const logQuery = query(collection(db, LOG_COLLECTION), orderBy("createdAt", "desc"), limit(LOG_LIMIT));
  onSnapshot(logQuery, (snap) => {
    const entries = snap.docs.map(d => d.data());
    renderLog(entries);
  });
}

init().catch(err => {
  console.error("blob init failed:", err);
  document.getElementById("blobStatusText").textContent = "couldn't reach the blob (check firebase config)";
});

setInterval(() => {
  if (currentPet) render(applyDecay(currentPet));
}, 30000);
</script>
<script src="../js/nav.js"></script>
<script src="../js/effects.js"></script>

</body>
