<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>guestbook</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="pane">
    <div class="content guestbook">
      <h2>sign the guestbook!</h2>
      <input type="text" placeholder="your name" id="gbName">
      <textarea placeholder="leave me a message..." id="gbMsg"></textarea>
      <button onclick="addEntry()">✎ sign it!</button>
      <div class="guestbook-entries" id="gbEntries">
        &gt; Queen Elizabeth the 2nd: love the site!! wish i'd been around for the publishing <br>
      </div>
    </div>
  </div>

  <script>
    function addEntry() {
      const name = document.getElementById('gbName').value.trim() || 'anonymous';
      const msg = document.getElementById('gbMsg').value.trim();
      if (!msg) return;
      const entries = document.getElementById('gbEntries');
      entries.innerHTML += `<br>&gt; ${name}: ${msg}`;
      document.getElementById('gbMsg').value = '';
      entries.scrollTop = entries.scrollHeight;
    }
  </script>
</body>
</html>
