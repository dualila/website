<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chatroom !!!</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="stylesheet" href="css/site.css">
</head>
<body>

  <div class="ticker"><span>✦ thank you for visiting and i welcome you with open arms ✦</span></div>

  <div class="layout">
    <div id="sidebar"></div>

    <div class="frame">

      <div class="hero">
        <h1>✧ live chatroom !!!✧</h1>
      </div>

      <div class="divider">★ ° ☆ ° ★ ° ☆ ° ★</div>

      <div class="content guestbook">
        <h2>what r u thinking about?</h2>
        <input type="text" placeholder="your name" id="gbName" maxlength="40">
        <textarea placeholder="leave me a message..." id="gbMsg" maxlength="300"></textarea>
        <button id="gbSubmit">✎ sign it!</button>
        <div class="guestbook-entries" id="gbEntries">loading entries...</div>
      </div>

      <div class="divider">★ ° ☆ ° ★ ° ☆ ° ★</div>

      <footer>
      ★ ° ☆ ° ★ ° ☆ ° ★ 2026 lily wakefield ★ ° ☆ ° ★ ° ☆ ° ★<br>
        <img src="/images/favicon.ico" alt="site icon" width="24" height="24">
        best experienced with the sound on and an open heart
      </footer>

    </div>
  </div>

  <script src="js/nav.js"></script>

  <script>
    // sparkle cursor trail
    const sparkleChars = ['✦', '✧', '☆', '★', '✨', '*'];
    let lastSparkle = 0;
    document.addEventListener('mousemove', (e) => {
      const now = Date.now();
      if (now - lastSparkle < 60) return; // throttle so it doesn't flood the DOM
      lastSparkle = now;

      const el = document.createElement('span');
      el.className = 'sparkle-trail';
      el.textContent = sparkleChars[Math.floor(Math.random() * sparkleChars.length)];
      el.style.left = e.clientX + 'px';
      el.style.top = e.clientY + 'px';
      el.style.color = `hsl(${Math.floor(Math.random() * 360)}, 100%, 70%)`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2400);
    });
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
    import {
      getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // Chatroom's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyA25PaWUE39RuX-huMHoziQVUPy_pNFXUE",
      authDomain: "dot-com-44502.firebaseapp.com",
      projectId: "dot-com-44502",
      storageBucket: "dot-com-44502.firebasestorage.app",
      messagingSenderId: "124684406308",
      appId: "1:124684406308:web:146706a03bb4bd451552b1",
      measurementId: "G-HPF4E6G5YW"
    };

    // Initialize Firebase once
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    const entriesEl = document.getElementById('gbEntries');
    const nameEl = document.getElementById('gbName');
    const msgEl = document.getElementById('gbMsg');
    const submitBtn = document.getElementById('gbSubmit');

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatTimestamp(ts) {
      if (!ts || !ts.toDate) return 'just now';
      const date = ts.toDate();
      const seconds = Math.floor((Date.now() - date.getTime()) / 1000);

      let relative;
      if (seconds < 5) relative = 'just now';
      else if (seconds < 60) relative = `${seconds}s ago`;
      else if (seconds < 3600) relative = `${Math.floor(seconds / 60)}m ago`;
      else if (seconds < 86400) relative = `${Math.floor(seconds / 3600)}h ago`;
      else if (seconds < 604800) relative = `${Math.floor(seconds / 86400)}d ago`;
      else relative = date.toLocaleDateString();

      const full = date.toLocaleString();
      return `${relative} (${full})`;
    }

    try {
      const gbRef = collection(db, "guestbook");
      const gbQuery = query(gbRef, orderBy("createdAt", "desc"), limit(100));

      onSnapshot(gbQuery, (snapshot) => {
        if (snapshot.empty) {
          entriesEl.innerHTML = '&gt; no entries yet... be the first!';
          return;
        }
        const rows = [];
        snapshot.forEach((doc) => {
          const d = doc.data();
          const when = formatTimestamp(d.createdAt);
          rows.push(`&gt; ${escapeHtml(d.name || 'anonymous loser')} <span style="color:#0a0">[${when}]</span>: ${escapeHtml(d.message || '')}`);
        });
        entriesEl.innerHTML = rows.join('<br>');
      }, (err) => {
        console.error(err);
        entriesEl.textContent = 'chatroom is offline right now, sorry! :(';
      });

      submitBtn.addEventListener('click', async () => {
        const name = nameEl.value.trim().slice(0, 40) || 'anonymous loser';
        const message = msgEl.value.trim().slice(0, 300);
        if (!message) return;

        submitBtn.disabled = true;
        try {
          await addDoc(gbRef, {
            name,
            message,
            createdAt: serverTimestamp()
          });
          msgEl.value = '';
        } catch (err) {
          console.error(err);
          alert('couldn\'t chat, try again in a sec!');
        } finally {
          submitBtn.disabled = false;
        }
      });
    } catch (err) {
      console.error('Firebase guestbook error:', err);
      entriesEl.textContent = 'chatroom needs to be connected to a database — see setup instructions in the page source!';
    }
  </script>

</body>
</html>
